global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: otel-demo
    environment: local

scrape_configs:
  # Scrape metrics exported by OTel Collector's Prometheus exporter
  - job_name: otel-collector-metrics
    static_configs:
      - targets: ["otel-collector:8889"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Scrape OTel Collector's own internal metrics
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]

  # Scrape the demo app directly (fallback / comparison)
  - job_name: otel-demo-app
    static_configs:
      - targets: ["otel-app:8080"]
    honor_labels: true
