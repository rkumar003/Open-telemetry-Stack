# Global settings
global:
  namespace: monitoring
  clusterName: "my-cluster"
  environment: "production"

# ─── OTel Collector ───────────────────────────────────────────────────────────
otelCollector:
  enabled: true
  image:
    repository: otel/opentelemetry-collector-contrib
    tag: "0.98.0"
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  # OTLP ports
  ports:
    grpc: 4317
    http: 4318
    metricsInternal: 8888
    metricsExport: 8889
    healthCheck: 13133
  serviceType: ClusterIP
  # Override collector config inline (templated)
  config:
    memoryLimitMib: 400
    spikeLimitMib: 100
    batchTimeout: "5s"
    batchSize: 1024

# ─── Prometheus ───────────────────────────────────────────────────────────────
prometheus:
  enabled: true
  image:
    repository: prom/prometheus
    tag: "v2.51.2"
    pullPolicy: IfNotPresent
  replicas: 1
  retention: "15d"
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"
  storage:
    size: "20Gi"
    storageClass: ""  # Use cluster default
  serviceType: ClusterIP
  port: 9090

# ─── Loki ─────────────────────────────────────────────────────────────────────
loki:
  enabled: true
  image:
    repository: grafana/loki
    tag: "3.0.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  storage:
    size: "10Gi"
    storageClass: ""
  port: 3100

# ─── Grafana ──────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  image:
    repository: grafana/grafana
    tag: "10.4.2"
    pullPolicy: IfNotPresent
  adminUser: admin
  adminPassword: "changeme"  # Override in production via sealed secrets
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  storage:
    size: "5Gi"
    storageClass: ""
  serviceType: ClusterIP
  port: 3000
  ingress:
    enabled: false
    host: "grafana.example.com"
    annotations: {}
    tls: []

# ─── Demo App ─────────────────────────────────────────────────────────────────
app:
  enabled: true
  image:
    repository: otel-demo-app
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  env:
    APP_ENV: "production"
