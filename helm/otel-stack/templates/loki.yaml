{{- if .Values.loki.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
data:
  loki-config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: {{ .Values.loki.port }}
    common:
      instance_addr: 0.0.0.0
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      allow_structured_metadata: true
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  serviceName: loki
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: loki
          image: "{{ .Values.loki.image.repository }}:{{ .Values.loki.image.tag }}"
          imagePullPolicy: {{ .Values.loki.image.pullPolicy }}
          args: ["-config.file=/etc/loki/loki-config.yaml"]
          ports:
            - containerPort: {{ .Values.loki.port }}
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: loki-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.loki.storage.storageClass }}
        storageClassName: {{ .Values.loki.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.loki.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: loki
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: {{ .Values.loki.port }}
      targetPort: http
{{- end }}
