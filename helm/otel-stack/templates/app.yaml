{{- if .Values.app.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo-app
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-app
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: otel-demo-app
  template:
    metadata:
      labels:
        app: otel-demo-app
        {{- include "otel-stack.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: otel-demo-app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector:{{ .Values.otelCollector.ports.grpc }}"
            - name: APP_ENV
              value: {{ .Values.app.env.APP_ENV }}
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-demo-app
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: demo-app
spec:
  selector:
    app: otel-demo-app
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
