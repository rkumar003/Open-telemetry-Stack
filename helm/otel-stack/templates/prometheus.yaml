{{- if .Values.prometheus.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      external_labels:
        cluster: {{ .Values.global.clusterName }}
        environment: {{ .Values.global.environment }}
    scrape_configs:
      - job_name: otel-collector-metrics
        static_configs:
          - targets: ["otel-collector:{{ .Values.otelCollector.ports.metricsExport }}"]
      - job_name: otel-collector-internal
        static_configs:
          - targets: ["otel-collector:{{ .Values.otelCollector.ports.metricsInternal }}"]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: prometheus
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  serviceName: prometheus
  replicas: {{ .Values.prometheus.replicas }}
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: "{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          imagePullPolicy: {{ .Values.prometheus.image.pullPolicy }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time={{ .Values.prometheus.retention }}"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: {{ .Values.prometheus.port }}
              name: http
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.prometheus.storage.storageClass }}
        storageClassName: {{ .Values.prometheus.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.prometheus.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ include "otel-stack.namespace" . }}
  labels:
    {{- include "otel-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: prometheus
spec:
  type: {{ .Values.prometheus.serviceType }}
  selector:
    app: prometheus
  ports:
    - name: http
      port: {{ .Values.prometheus.port }}
      targetPort: http
{{- end }}
